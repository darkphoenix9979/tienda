<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AnimeStore</title>
    <link rel="stylesheet" href="tienda.css">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <link rel="stylesheet" href="chatbot.css">
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">AnimeStore</div>
    <div class="nav-links">
        <span>Inicio</span>
        <span>Figuras</span>
        <span>Mangas</span>
        <span>Ropa</span>
    </div>
    <div class="user-menu" id="userMenu">
        <div class="user-trigger">
            <div class="avatar" id="avatar"></div>
            <span id="usernameDisplay"></span>
            <span class="arrow" id="arrow">▼</span>
        </div>
        <div class="dropdown" id="dropdown">
            <div class="dropdown-item" onclick="logout()">Cerrar sesión</div>
        </div>
    </div>
    <div class="cart-icon">
        🛒 <span id="cartCount">0</span>
    </div>
    <!-- MODAL CARRITO -->
    <div id="cartModal" class="cart-modal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>Mi Carrito</h2>
                <span id="closeCart">✖</span>
            </div>
            <div id="cartItems"></div>
            <div class="cart-footer">
                <h3 id="cartTotal">Total: $0 MXN</h3>
                <button onclick="simularCompra()">Comprar</button>
            </div>
        </div>
    </div>
</div>

<!-- HERO -->
<div class="hero" id="heroCarousel">
    <div class="hero-overlay"></div>
</div>

<!-- SECCIÓN PRODUCTOS -->
<div class="section">
    <h2>Productos</h2>
    <div class="row" id="productos"></div>
</div>

<!-- SECCIÓN CARRITO -->
<div class="section">
    <h2>Mi Carrito</h2>
    <div class="row" id="carrito"></div>
    <div style="margin-top:15px;">
        <button id="clearCartBtn">Vaciar Carrito</button>
    </div>
</div>

<!-- FOOTER (sin estilos en línea - usa CSS) -->
<footer class="site-footer">
    © 2026 AnimeStore - Todos los derechos reservados
</footer>

<!-- Botones flotantes -->
<div class="floating-left">
    <button id="theme-toggle" class="floating-btn" aria-label="Cambiar tema">☀️</button>
</div>
<div class="floating-right">
    <div id="chatButton" class="floating-btn">💬</div>
</div>

<!-- Chatbot -->
<div id="chatContainer">
    <div class="chat-header">
        Asistente
        <span id="closeChat">✖</span>
    </div>
    <div id="chatbox"></div>
    <div class="chat-input">
        <input id="userInput" type="text" placeholder="Haz una pregunta...">
        <button>Enviar</button>
    </div>
</div>

<!-- ==========================
     SCRIPTS - ORDEN CORRECTO
     ========================== -->
<!-- 1. Primero los scripts principales -->
<script src="tienda.js"></script>
<script src="chatbot.js"></script>

<!-- 2. AL FINAL: Script del tema (después de que todo cargue) -->
<script>
(function() {
    // Esperar a que TODO el DOM esté listo
    function initTheme() {
        const toggle = document.getElementById('theme-toggle');
        const root = document.documentElement;
        
        if (!toggle) {
            console.error('❌ ERROR: No se encontró #theme-toggle');
            return;
        }

        // Cargar tema guardado
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            root.setAttribute('data-theme', 'light');
            toggle.textContent = '🌙';
        } else {
            toggle.textContent = '☀️';
        }

        // Evento Click
        toggle.addEventListener('click', function() {
            const isDark = root.getAttribute('data-theme') !== 'light';
            if (isDark) {
                root.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                toggle.textContent = '🌙';
            } else {
                root.removeAttribute('data-theme');
                localStorage.setItem('theme', 'dark');
                toggle.textContent = '☀️';
            }
        });
    }

    // Ejecutar cuando el DOM esté completamente cargado
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initTheme);
    } else {
        initTheme();
    }
})();
</script>

</body>
</html>
