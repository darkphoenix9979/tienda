<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AnimeStore</title>
<link rel="stylesheet" href="tienda.css">
</head>

<body>

<div class="navbar">

<div class="logo">AnimeStore</div>

<div class="nav-links">
<span>Inicio</span>
<span>Figuras</span>
<span>Mangas</span>
<span>Ropa</span>
</div>

<div class="user-menu" id="userMenu">

<div class="user-trigger">

<div class="avatar" id="avatar"></div>

<span id="usernameDisplay"></span>

<span class="arrow" id="arrow">▼</span>

</div>

<div class="dropdown" id="dropdown"></div>

</div>

<div class="cart-icon">
🛒 <span id="cartCount">0</span>
</div>

</div>

<!-- HERO -->

<div class="hero" id="heroCarousel">
<div class="hero-overlay"></div>
</div>

<!-- PRODUCTOS -->

<div class="section">
<h2>Productos</h2>
<div class="row" id="productos"></div>
</div>

<!-- MODAL CARRITO -->

<div id="cartModal" class="cart-modal">

<div class="cart-panel">

<div class="cart-header">

<h2>Mi Carrito</h2>

<span id="closeCart">✕</span>

</div>

<div id="cartItems"></div>

<div class="cart-footer">

<h3 id="cartTotal">Total: $0 MXN</h3>

<button class="cart-btn" onclick="vaciarCarrito()">Vaciar carrito</button>

<button class="cart-btn buy-btn" onclick="simularCompra()">Comprar</button>

</div>

</div>

</div>

<footer style="margin-top:60px;padding:30px;background:#111;text-align:center;color:#777;">
© 2026 AnimeStore
</footer>

<script src="tienda.js"></script>

</body>
</html>
