<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AnimeStore</title>
    <link rel="stylesheet" href="tienda.css">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <link rel="stylesheet" href="chatbot.css">
    <link rel="stylesheet" href="keyboard-nav.css">
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">AnimeStore</div>
    <div class="nav-links">
        <span>Inicio</span>
        <span>Figuras</span>
        <span>Mangas</span>
        <span>Ropa</span>
    </div>
    <div class="user-menu" id="userMenu">
        <div class="user-trigger">
            <div class="avatar" id="avatar"></div>
            <span id="usernameDisplay"></span>
            <span class="arrow" id="arrow">▼</span>
        </div>
        <div class="dropdown" id="dropdown">
            <div class="dropdown-item" onclick="logout()">Cerrar sesión</div>
        </div>
    </div>
    <div class="cart-icon">
        🛒 <span id="cartCount">0</span>
    </div>
    <!-- MODAL CARRITO -->
    <div id="cartModal" class="cart-modal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>Mi Carrito</h2>
                <span id="closeCart">✖</span>
            </div>
            <div id="cartItems"></div>
            <div class="cart-footer">
                <h3 id="cartTotal">Total: $0 MXN</h3>
                <button onclick="simularCompra()">Comprar</button>
            </div>
        </div>
    </div>
</div>

<!-- HERO -->
<div class="hero" id="heroCarousel">
    <div class="hero-overlay"></div>
</div>

<!-- SECCIÓN PRODUCTOS -->
<div class="section">
    <h2>Productos</h2>
    <div class="row" id="productos"></div>
</div>

<!-- SECCIÓN CARRITO -->
<div class="section">
    <h2>Mi Carrito</h2>
    <div class="row" id="carrito"></div>
    <div style="margin-top:15px;">
        <button id="clearCartBtn">Vaciar Carrito</button>
    </div>
</div>

<!-- FOOTER -->
<footer class="site-footer">
    © 2026 AnimeStore - Todos los derechos reservados
</footer>

<!-- Botones flotantes (UNA SOLA VEZ) -->
<div class="floating-left">
    <button id="theme-toggle" class="floating-btn" aria-label="Cambiar tema">☀️</button>
    <button id="guidedReadingBtn" class="guided-reading-btn" aria-label="Lectura guiada" title="Lectura guiada (G)">📖</button>
</div>

<div class="floating-right">
    <div id="chatButton" class="floating-btn">💬</div>
</div>

<!-- Chatbot -->
<div id="chatContainer">
    <div class="chat-header">
        Asistente
        <span id="closeChat">✖</span>
    </div>
    <div id="chatbox"></div>
    <div class="chat-input">
        <input id="userInput" type="text" placeholder="Haz una pregunta...">
        <button>Enviar</button>
    </div>
</div>

<!-- Panel de control de lectura guiada -->
<div id="guidedReadingPanel" class="guided-reading-panel">
    <h4>📖 Lectura Guiada</h4>
    <div class="guided-reading-controls">
        <button id="grStart">Iniciar</button>
        <button id="grStop">Detener</button>
        <button id="grPrev">◀ Ant</button>
        <button id="grNext">Sig ▶</button>
    </div>
    <div class="guided-reading-progress" id="grProgress">0 / 0</div>
</div>

<!-- Scripts en orden correcto -->
<script src="tienda.js"></script>
<script src="chatbot.js"></script>
<script src="keyboard-nav.js"></script>
<script src="guided-reading.js"></script>

<script>
// Esperar a que el DOM esté listo
document.addEventListener('DOMContentLoaded', function() {
    const btn = document.getElementById('guidedReadingBtn');
    const panel = document.getElementById('guidedReadingPanel');
    
    // Si no existen los elementos, salir
    if (!btn || !panel) {
        console.warn('⚠️ No se encontró guidedReadingBtn o guidedReadingPanel');
        return;
    }
    
    // Click para mostrar/ocultar panel
    btn.addEventListener('click', function() {
        panel.classList.toggle('visible');
        btn.classList.toggle('active');
        console.log('📖 Panel visible:', panel.classList.contains('visible'));
    });
    
    // === CONTROLES DEL PANEL (si existen) ===
    const grStart = document.getElementById('grStart');
    const grStop = document.getElementById('grStop');
    const grPrev = document.getElementById('grPrev');
    const grNext = document.getElementById('grNext');
    
    if (grStart) grStart.addEventListener('click', function() {
        console.log('▶️ Iniciar lectura guiada');
        // Aquí iría la lógica de guided-reading.js
    });
    
    if (grStop) grStop.addEventListener('click', function() {
        console.log('⏹️ Detener lectura guiada');
    });
    
    if (grPrev) grPrev.addEventListener('click', function() {
        console.log('◀️ Elemento anterior');
    });
    
    if (grNext) grNext.addEventListener('click', function() {
        console.log('▶️ Siguiente elemento');
    });
});
</script>

</body>
</html>
