<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AnimeStore</title>
    <link rel="stylesheet" href="tienda.css">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <link rel="stylesheet" href="chatbot.css">
    <link rel="stylesheet" href="keyboard-nav.css">
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">AnimeStore</div>
    <div class="nav-links">
        <span>Inicio</span>
        <span>Figuras</span>
        <span>Mangas</span>
        <span>Ropa</span>
    </div>
    <div class="user-menu" id="userMenu">
        <div class="user-trigger">
            <div class="avatar" id="avatar"></div>
            <span id="usernameDisplay"></span>
            <span class="arrow" id="arrow">▼</span>
        </div>
        <div class="dropdown" id="dropdown">
            <div class="dropdown-item" onclick="logout()">Cerrar sesión</div>
        </div>
    </div>
    <div class="cart-icon">
        🛒 <span id="cartCount">0</span>
    </div>
    <!-- MODAL CARRITO -->
    <div id="cartModal" class="cart-modal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>Mi Carrito</h2>
                <span id="closeCart">✖</span>
            </div>
            <div id="cartItems"></div>
            <div class="cart-footer">
                <h3 id="cartTotal">Total: $0 MXN</h3>
                <button onclick="simularCompra()">Comprar</button>
            </div>
        </div>
    </div>
</div>

<!-- HERO -->
<div class="hero" id="heroCarousel">
    <div class="hero-overlay"></div>
</div>

<!-- SECCIÓN PRODUCTOS -->
<div class="section">
    <h2>Productos</h2>
    <div class="row" id="productos"></div>
</div>

<!-- SECCIÓN CARRITO -->
<div class="section">
    <h2>Mi Carrito</h2>
    <div class="row" id="carrito"></div>
    <div style="margin-top:15px;">
        <button id="clearCartBtn">Vaciar Carrito</button>
    </div>
</div>

<!-- FOOTER -->
<footer class="site-footer">
    © 2026 AnimeStore - Todos los derechos reservados
</footer>

<!-- Botones flotantes (UNA SOLA VEZ) -->
<div class="floating-left">
    <button id="theme-toggle" class="floating-btn" aria-label="Cambiar tema">☀️</button>
    <button id="guidedReadingBtn" class="guided-reading-btn" aria-label="Lectura guiada" title="Lectura guiada (G)">📖</button>
</div>

<div class="floating-right">
    <div id="chatButton" class="floating-btn">💬</div>
</div>

<!-- Chatbot -->
<div id="chatContainer">
    <div class="chat-header">
        Asistente
        <span id="closeChat">✖</span>
    </div>
    <div id="chatbox"></div>
    <div class="chat-input">
        <input id="userInput" type="text" placeholder="Haz una pregunta...">
        <button>Enviar</button>
    </div>
</div>

<!-- Panel de control de lectura guiada -->
<div id="guidedReadingPanel" class="guided-reading-panel">
    <h4>📖 Lectura Guiada</h4>
    <div class="guided-reading-controls">
        <button id="grStart">Iniciar</button>
        <button id="grStop">Detener</button>
        <button id="grPrev">◀ Ant</button>
        <button id="grNext">Sig ▶</button>
    </div>
    <div class="guided-reading-progress" id="grProgress">0 / 0</div>
</div>

<!-- Scripts en orden correcto -->
<script src="tienda.js"></script>
<script src="chatbot.js"></script>
<script src="keyboard-nav.js"></script>

<!-- Lectura guiada con Web Speech API nativa -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const btn = document.getElementById('guidedReadingBtn');
    const panel = document.getElementById('guidedReadingPanel');
    const grStart = document.getElementById('grStart');
    const grStop = document.getElementById('grStop');
    const grPrev = document.getElementById('grPrev');
    const grNext = document.getElementById('grNext');
    const grProgress = document.getElementById('grProgress');

    if (!btn || !panel) return;

    // Mostrar/ocultar panel
    btn.addEventListener('click', function() {
        panel.classList.toggle('visible');
        btn.classList.toggle('active');
    });

    // Lógica de lectura guiada
    let chunks = [];
    let currentIndex = 0;
    let isPlaying = false;
    let utterance = null;

    // Verificar soporte del navegador
    if (!('speechSynthesis' in window)) {
        console.warn('⚠️ Tu navegador no soporta lectura por voz.');
        grStart.disabled = true;
    }

    function loadText() {
        const elements = document.querySelectorAll('h1, h2, h3, p, li, span:not(.arrow):not(#cartCount):not(#grProgress)');
        let fullText = '';
        elements.forEach(el => {
            // Solo tomar texto visible y no vacío
            if (el.offsetParent !== null && el.innerText.trim() !== '') {
                fullText += el.innerText + '. ';
            }
        });
        // Dividir por oraciones
        chunks = fullText.match(/[^.!?]+[.!?]+/g) || [fullText.trim()];
        chunks = chunks.map(c => c.trim()).filter(c => c.length > 3);
        updateProgress();
    }

    function updateProgress() {
        if (grProgress) grProgress.textContent = `${currentIndex + 1} / ${chunks.length}`;
    }

    function speak(index) {
        if (index < 0 || index >= chunks.length) {
            isPlaying = false;
            return;
        }
        window.speechSynthesis.cancel();
        currentIndex = index;
        updateProgress();

        utterance = new SpeechSynthesisUtterance(chunks[currentIndex]);
        utterance.lang = 'es-MX'; // Voz en español
        utterance.rate = 0.9;
        utterance.pitch = 1;

        utterance.onend = function() {
            if (isPlaying) speak(currentIndex + 1);
        };

        utterance.onerror = function() {
            isPlaying = false;
        };

        window.speechSynthesis.speak(utterance);
    }

    grStart.addEventListener('click', function() {
        if (chunks.length === 0) loadText();
        if (!isPlaying) {
            isPlaying = true;
            speak(currentIndex);
        }
    });

    grStop.addEventListener('click', function() {
        isPlaying = false;
        window.speechSynthesis.cancel();
    });

    grPrev.addEventListener('click', function() {
        window.speechSynthesis.cancel();
        currentIndex = currentIndex > 0 ? currentIndex - 1 : chunks.length - 1;
        isPlaying = true;
        speak(currentIndex);
    });

    grNext.addEventListener('click', function() {
        window.speechSynthesis.cancel();
        currentIndex = currentIndex < chunks.length - 1 ? currentIndex + 1 : 0;
        isPlaying = true;
        speak(currentIndex);
    });

    // Cargar texto inicial
    loadText();
});
</script>

</body>
</html>
