<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AnimeStore</title>
<link rel="stylesheet" href="tienda.css">
</head>

<body>

<header>

<h1>AnimeStore</h1>

<input type="text" id="searchInput" placeholder="Buscar producto...">

<div class="right-menu">

<div class="cart-icon" id="cartIcon">
🛒 <span id="cartCount">0</span>
</div>

<div class="user-menu" id="userMenu">

<div class="avatar" id="avatar">?</div>
<span id="usernameDisplay">Invitado</span>

<div class="dropdown" id="dropdown"></div>

</div>

</div>

</header>

<section id="productsContainer" class="products"></section>


<!-- CARRITO -->

<div id="cartModal" class="cart-modal">

<div class="cart-panel">

<div class="cart-header">
<h2>Mi carrito</h2>
<span id="closeCart">✕</span>
</div>

<div id="cartItems"></div>

<div class="cart-footer">

<h3 id="cartTotal">Total: $0</h3>

<button class="btn" onclick="vaciarCarrito()">Vaciar</button>
<button class="btn buy" onclick="simularCompra()">Comprar</button>

</div>

</div>

</div>


<script src="tienda.js"></script>

</body>
</html>
