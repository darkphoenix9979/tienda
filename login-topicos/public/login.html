<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Anime Auth | Tienda</title>
<link rel="stylesheet" href="login.css">
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

    <!-- LOGIN -->
    <form id="loginForm" class="form active">
        <h2>✨ Iniciar Sesión ✨</h2>

        <div class="input-group">
            <i>📧</i>
            <input type="email" id="loginEmail" placeholder="Correo" required>
        </div>

        <div class="input-group">
            <i>🔒</i>
            <input type="password" id="loginPassword" placeholder="Contraseña" required>
            <span class="toggle-pass" onclick="togglePassword('loginPassword')" role="boton" tabindex="0" aria-label="Mostrar u ocultar contraseña">👁</span>
        </div>

        <div class="g-recaptcha" 
            data-sitekey="6LeHu-EsAAAAAHx5HnVt12vaYsGYUMHbsXPej7Vj"
            data-callback="onRecaptchaVerified"
            data-expired-callback="onRecaptchaExpired"
            data-size="normal"> 
        </div>

        <button type="submit">Entrar</button>

        <div class="switch" onclick="switchForm()">¿No tienes cuenta? Regístrate</div>
    </form>

    <!-- REGISTER -->
    <div id="registerForm" class="form hidden">
        <h2>🌸 Crear Cuenta 🌸</h2>

        <div class="input-group">
            <i>👤</i>
            <input type="text" id="registerUsername" placeholder="Usuario">
        </div>

        <div class="input-group">
            <i>📧</i>
            <input type="email" id="registerEmail" placeholder="Correo">
        </div>

        <div class="input-group">
            <i>🔒</i>
            <input type="password" id="registerPassword" placeholder="Contraseña">
            <span class="toggle-pass" onclick="togglePassword('registerPassword')">👁</span>
        </div>

        <!-- En tu formulario de registro -->
<button type="button" onclick="register()" class="btn-register">
    Registrarse
</button>

        <div class="switch" onclick="switchForm()">¿Ya tienes cuenta? Inicia sesión</div>
    </div>

    <!-- Modal de verificación 2FA -->
<div id="twoFAModal" class="modal hidden">
    <div class="modal-content">
        <h3>🔐 Verificación de Seguridad</h3>
        <p id="twoFAMessage">Hemos enviado un código a tu correo electrónico.</p>
        
        <input type="text" id="twoFACode" placeholder="Ingresa el código de 6 dígitos" 
               maxlength="6" pattern="[0-9]{6}" required>
        
        <div class="actions">
            <button type="button" onclick="resendCode()">Reenviar código</button>
            <button type="button" onclick="submit2FA()">Verificar</button>
        </div>
        <p id="twoFAError" class="error"></p>
    </div>
</div>

</div>

<script src="login.js"></script>
</body>
</html>
