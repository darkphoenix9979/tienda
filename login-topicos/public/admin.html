<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Admin - Anime Store</title>
<link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="container">

<h2>📦 Crear Producto</h2>

<form id="productForm">

<input type="text" id="name" placeholder="Nombre" required>

<input type="number" id="price" placeholder="Precio" required>

<input type="number" id="stock" placeholder="Stock" required>

<input type="file" id="image" accept="image/*" required>

<img id="preview" class="preview">

<button type="submit">Crear Producto</button>

</form>

<div id="message"></div>


<h2 style="margin-top:40px;">🛒 Productos</h2>

<div id="productList"></div>


<h2 style="margin-top:40px;">🎞 Carrusel</h2>

<input type="file" id="carouselImage">

<button onclick="subirImagenCarrusel()">Agregar Imagen</button>

<div id="carouselList"></div>


<h2 style="margin-top:40px;">🤖 Preguntas del Chatbot</h2>

<ul id="questionsList"></ul>

</div>

<script src="admin.js"></script>

</body>
</html>
